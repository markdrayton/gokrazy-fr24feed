name: Build new root filesystem
on:
  schedule:
    - cron: "35 6 * * 0"
  workflow_dispatch: 

jobs:
  updateroot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
         token: ${{ secrets.PAT_TOKEN }}
      - name: Fetch latest fr24feed version string
        id: version
        run: |
          fr24feed_version=$(curl --silent -o - https://repo-feed.flightradar24.com/CHANGELOG.md | awk '/^#\[/ { print $1 }' | grep -o -m 1 '[0-9\.-]\+')
          echo "fr24feed_version=$fr24feed_version" >> $GITHUB_OUTPUT
      - name: Update root filesystem
        run: |
          ./buildroot.sh ${{ steps.version.outputs.fr24feed_version }}
      - name: Commit changes
        run: |
          if [ $(git status --porcelain | wc -l) -gt 0 ]; then
            git config --global user.email "mdrayton@gmail.com"
            git config --global user.name "Mark Drayton"
            git add .
            git commit -m "Update to fr24feed ${{ steps.version.outputs.fr24feed_version }}"
            git push
          fi
